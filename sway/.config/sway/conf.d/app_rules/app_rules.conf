### App Rules (floating, assign, opacity...)

# Exemple lorsque tu voudras ajouter :
# for_window [class="mpv"] floating enable
# assign [class="Firefox"] 1

# Uncomment this code below if you want no titlebars
#default_border none 

for_window [app_id="rofi"] border none, floating enable, move position 1 ppt 1 ppt
for_window [title="UxPlay"] floating enable

# DJ mode : les terminaux cava passent en plein écran sans bordure
for_window [app_id="^cava-dj"] border none, fullscreen enable

# Animations ASCII (firework-rs) : ghostty transparent couvrant l'écran.
# app_id = --class passé à ghostty (doit être un id GTK valide, cf. picker).
# Pas de `fullscreen` : en vrai plein écran sway peint du noir derrière la fenêtre
# (ni wallpaper ni waybar). On la met flottante et dimensionnée à 100% de l'écran
# pour que la transparence laisse voir le wallpaper (calque background swww).
# Échap pour quitter.
for_window [app_id="com.firework.effect"] floating enable, border none, resize set width 100 ppt height 100 ppt, move position 0 0
