### Thème « Crépuscule rose »

# Palette
set $bg      #150d24
set $bg-alt  #1e1233
set $surface #2d2872
set $muted   #4b3a8c
set $slate   #323169
set $mauve   #7e4ca0
set $magenta #b35298
set $rose    #e3779e
set $peach   #efaaa2
set $lilac   #c9add1
set $fg      #ece4f2

# Bordures des fenêtres
# client.<état>         <border>  <background> <text>  <indicator> <child_border>
client.focused          $rose     $surface     $fg     $magenta    $rose
client.focused_inactive $slate    $bg-alt      $lilac  $slate      $slate
client.unfocused        $muted    $bg          $lilac  $muted      $muted
client.urgent           $magenta  $magenta     $fg     $magenta    $magenta

# Bordures et gaps
default_border pixel 2
default_floating_border pixel 2
gaps inner 6
gaps outer 3

# Police
font pango:monospace 10
