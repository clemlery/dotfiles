# Cava — DJ mode / variante 2 « Crépuscule »
# Barres larges, ondes (waves), dégradé inversé : crème en bas -> slate en haut.
# Thème « Crépuscule rose ».

[general]
framerate = 60
bars = 0
bar_width = 5
bar_spacing = 2

[input]
method = pulse
source = auto

[output]
method = noncurses
channels = stereo
mono_option = average

[color]
background = '#150d24'
gradient = 1
gradient_count = 6
gradient_color_1 = '#ece4f2'
gradient_color_2 = '#efaaa2'
gradient_color_3 = '#e3779e'
gradient_color_4 = '#b35298'
gradient_color_5 = '#7e4ca0'
gradient_color_6 = '#323169'

[smoothing]
noise_reduction = 88
monstercat = 1
waves = 1
