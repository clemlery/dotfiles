# Cava — DJ mode / variante 1 « Néon »
# Barres fines, stéréo, dégradé froid (slate) -> chaud (crème).
# Thème « Crépuscule rose ».

[general]
framerate = 60
bars = 0
bar_width = 2
bar_spacing = 1

[input]
method = pulse
source = auto

[output]
method = noncurses
channels = stereo
mono_option = average

[color]
background = '#150d24'
gradient = 1
gradient_count = 6
gradient_color_1 = '#323169'
gradient_color_2 = '#7e4ca0'
gradient_color_3 = '#b35298'
gradient_color_4 = '#e3779e'
gradient_color_5 = '#efaaa2'
gradient_color_6 = '#ece4f2'

[smoothing]
noise_reduction = 77
monstercat = 1
waves = 0
